{% set name = "PyClibrary" %}
{% set version = "0.3.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|lower }}-{{ version }}.tar.gz
  sha256: 8a3eaa9ab728c11b077644275af4e05ca24ddcad491f47eb45b75db6be52c654

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - pyparsing >=2.3.1,<4
    - python >={{ python_min }}

test:
  imports:
    - pyclibrary
    - pyclibrary.backends
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://github.com/MatthieuDartiailh/pyclibrary
  summary: C binding automation
  license: MIT
  license_file: LICENSE
  doc_url: https://pyclibrary.readthedocs.io/en/latest/

extra:
  recipe-maintainers:
    - jakirkham
    - BastianZim
